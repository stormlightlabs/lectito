<!doctype html>
<html lang="en">
<head>
  <title>MDN embedded videos fixture</title>
  <meta name="description" content="Representative MDN embedded learning frames and media.">
</head>
<body>
  <main>
    <article>
      <h1>MDN embedded videos fixture</h1>
      <p>
        MDN learning articles include runnable sample frames and embedded
        media. Article markdown should preserve useful video destinations.
      </p>
      <figure>
        <iframe
          title="Video and audio sample"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          loading="lazy"></iframe>
        <figcaption>Embedded lesson video</figcaption>
      </figure>
      <p>
        The prose around the frame remains readable even when browser-only
        sample UI is removed from the extracted article.
      </p>
    </article>
  </main>
</body>
</html>
