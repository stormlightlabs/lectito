name = "stanford-encyclopedia"
hosts = ["plato.stanford.edu"]
content_roots = ["//div[@id='article-content']", "//main"]
remove_id_or_class = [
  "sidebar",
  "navigation",
  "nav",
  "menu",
  "footer",
  "header",
  "breadcrumb",
  "breadcrumbs",
  "related",
  "social",
  "utility",
  "tools",
  "article-sidebar",
  "toc",
  "academic-tools",
  "other-internet-resources",
  "related-entries",
]
remove = [
  "//div[@class='su-brand-bar']",
  "//div[@class='su-global-header']",
  "//div[@class='su-global-footer']",
  "//nav[contains(@class, 'su-navigation')]",
  "//aside[contains(@class, 'su-sidebar')]",
  "//div[contains(@class, 'admin')]",
  "//div[contains(@class, 'edit')]",
  "//div[contains(@class, 'toolbar')]",
  "//*[@id='toc']",
  "//div[@id='academic-tools']",
  "//div[@id='other-internet-resources']",
  "//div[@id='related-entries']",
]

[metadata]
title = ["//h1"]
author = ["//meta[@name='citation_author']/@content", "//span[@class='author']"]
date = ["//div[@id='pubinfo']/text()", "//time[@class='date']"]

[cleanup]
enabled = false
prune = false

[fallback]
generic_on_empty = true
