name = "mozilla"
hosts = ["mozilla.org"]
subdomains = true
content_roots = ["//div[@class='entry-content']"]
remove_id_or_class = [
  "comments",
  "navigation",
  "nav",
  "menu",
  "sidebar",
  "widget",
  "footer",
  "header",
]
remove = [
  "//div[@class='mh-container']",
  "//div[@class='mh-header']",
  "//div[@class='mh-widget']",
  "//div[@class='mh-footer']",
  "//nav[contains(@class, 'navigation')]",
  "//aside[contains(@class, 'widget')]",
  "//div[contains(@class, 'share')]",
  "//div[contains(@class, 'social')]",
  "//div[contains(@class, 'related')]",
  "//div[contains(@class, 'tags')]",
]

[metadata]
title = ["//h1[@class='entry-title']"]
author = ["//a[@rel='author']"]
date = ["//p[@class='entry-posted']//abbr[@class='published']/@title"]

[cleanup]
prune = true

[fallback]
generic_on_empty = true
