[package]
name = "lectito-cli"
version = "0.1.0"
edition = "2024"
license.workspace = true

[[bin]]
name = "readability"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
lectito-fixtures = { path = "../fixtures" }
lectito-core = { path = "../core" }
owo-colors = "4.2"
reqwest = { version = "0.13.3", features = ["blocking"] }
scraper.workspace = true
serde_json = "1.0"
