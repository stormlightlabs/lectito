[book]
title = "Lectito Book"
authors = ["Stormlight Labs"]
description = "Documentation for the Lectito extraction library, CLI, API, and web app"
language = "en"
src = "src"

[rust]
edition = "2024"

[build]
build-dir = "output"
create-missing = true

[output.html]
default-theme = "light"
preferred-dark-theme = "light"
additional-css = ["theme/css/custom-theme.css"]
git-repository-url = "https://github.com/stormlightlabs/lectito"
edit-url-template = "https://github.com/stormlightlabs/lectito/edit/main/docs/{path}"
site-url = "/lectito/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 20
use-hierarchical-search = true

[output.html.playground]
editable = true
copyable = true
runnable = true

[preprocessor.links]
