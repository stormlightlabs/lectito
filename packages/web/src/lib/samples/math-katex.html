<!doctype html>
<html lang="en">
<head>
  <title>KaTeX math fixture</title>
  <meta name="description" content="Representative KaTeX markup with TeX annotations.">
</head>
<body>
  <main>
    <article>
      <h1>KaTeX math fixture</h1>
      <p>
        KaTeX output exposes MathML annotations that carry the original TeX.
        The markdown renderer should prefer those annotations.
      </p>
      <p>
        Inline energy is
        <span class="katex">
          <span class="katex-mathml">
            <math>
              <semantics>
                <mrow><mi>E</mi><mo>=</mo><mi>m</mi><msup><mi>c</mi><mn>2</mn></msup></mrow>
                <annotation encoding="application/x-tex">E=mc^2</annotation>
              </semantics>
            </math>
          </span>
        </span>
        and a displayed integral follows.
      </p>
      <p>
        <span class="katex-display">
          <span class="katex">
            <span class="katex-mathml">
              <math display="block">
                <semantics>
                  <mrow><mi>I</mi><mo>=</mo><mn>1</mn></mrow>
                  <annotation encoding="application/x-tex">\int_0^1 x\,dx</annotation>
                </semantics>
              </math>
            </span>
          </span>
        </span>
      </p>
    </article>
  </main>
</body>
</html>
