<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Embedded solo breakdown</title>
</head>
<body>
  <article>
    <h1>Embedded solo breakdown</h1>
    <p>The lesson includes a playable clip alongside the written analysis.</p>
    <figure class="video-embed">
      <iframe
        src="https://www.youtube.com/embed/solo-lesson"
        title="Solo lesson"
        allow="accelerometer; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen></iframe>
      <figcaption>Watch the embedded performance before reading the breakdown.</figcaption>
    </figure>
    <iframe src="https://ads.example.com/pre-roll"></iframe>
  </article>
</body>
</html>
